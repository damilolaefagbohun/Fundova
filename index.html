// Session persistence - 24 hours
function saveSession(user){
  const session={user,expiry:Date.now()+(24*60*60*1000)};
  try{localStorage.setItem('fundova_session',JSON.stringify(session));}catch(e){}
}
function loadSession(){
  try{
    const raw=localStorage.getItem('fundova_session');
    if(!raw)return null;
    const session=JSON.parse(raw);
    if(Date.now()>session.expiry){localStorage.removeItem('fundova_session');return null;}
    return session.user;
  }catch(e){return null;}
}
function clearSession(){
  try{localStorage.removeItem('fundova_session');}catch(e){}
}

async function sb(path,opts={}){
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),10000);
  try{
    const res=await fetch(SB_URL+'/rest/v1/'+path,{
      signal:controller.signal,
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
      ...opts
    });
    clearTimeout(timeout);
    if(!res.ok){const e=await res.text();throw new Error(e);}
    const text=await res.text();
    return text?JSON.parse(text):null;
  }catch(e){
    clearTimeout(timeout);
    if(e.name==='AbortError')throw new Error('Request timed out. Check your internet connection.');
    throw e;
  }
}

async function sendEmail(payload){

}

function countWeekdays(startDate,endDate){
  let count=0;const d=new Date(startDate);const end=new Date(endDate);
  d.setHours(0,0,0,0);end.setHours(0,0,0,0);
  while(d<end){const day=d.getDay();if(day!==0&&day!==6)count++;d.setDate(d.getDate()+1);}
  return count;
}
function calcAccruedInterest(amount,payDate,withdrawnAt){
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(payDate);start.setHours(0,0,0,0);
  if(start>=today)return 0;
  // If withdrawn, interest only accrued up to the withdrawal date
  const end=withdrawnAt?new Date(withdrawnAt):today;
  end.setHours(0,0,0,0);
  if(start>=end)return 0;
  return+(Number(amount)*RATE*(countWeekdays(start,end)/WEEKDAYS_PER_YEAR)).toFixed(2);
}

async function doLogin(){

  const pin=document.getElementById('l-pin').value.trim();
  const err=document.getElementById('l-err');
  const btn=document.getElementById('l-btn');
  if(!email||!pin){err.textContent='Please enter your email and PIN.';return;}
  btn.innerHTML='<span class="spinner"></span> Signing in…';btn.disabled=true;
  try{
    const users=await sb(`users?email=eq.${encodeURIComponent(email)}&pin=eq.${encodeURIComponent(pin)}&select=*`);
    if(!users||!users.length){err.textContent='Invalid email or PIN.';btn.innerHTML='<i class="ti ti-login"></i> Sign in';btn.disabled=false;return;}
    currentUser=users[0];saveSession(currentUser);await render();

}

function checkNameMatch(){
  const accountName=(document.getElementById('s-aname').value||'').trim().toLowerCase();
  const registeredName=(window._sName||'').trim().toLowerCase();
  const mismatch=document.getElementById('s-mismatch');
  const consentRow=document.getElementById('s-consent-row');
  const anameVal=document.getElementById('s-aname-val');
  if(accountName.length>2&&registeredName.length>2){
    const aParts=accountName.split(' ');
    const rParts=registeredName.split(' ');
    const overlap=aParts.filter(p=>p.length>1&&rParts.some(r=>r.includes(p)||p.includes(r)));
    if(overlap.length===0){
      anameVal.textContent=document.getElementById('s-aname').value.trim();
      mismatch.style.display='flex';
      consentRow.style.display='flex';
      document.getElementById('s-aname').classList.add('warn');
    } else {
      mismatch.style.display='none';
      consentRow.style.display='none';
      document.getElementById('s-aname').classList.remove('warn');
    }
  }
}

async function submitSignup(){
  const bank_name=document.getElementById('s-bank').value.trim();
  const referred_by=(document.getElementById('s-referral')?.value||'').trim();
  const account_number=document.getElementById('s-anum').value.trim();
  const account_name=document.getElementById('s-aname').value.trim();
  const err=document.getElementById('s-err2');
  const btn=document.getElementById('s-btn2');
  const mismatchVisible=document.getElementById('s-mismatch').style.display!=='none';
  const consentChecked=mismatchVisible?document.getElementById('s-consent').checked:true;
  if(!bank_name||!account_number||!account_name){err.textContent='All fields are required.';return;}
  if(!/^\d{10}$/.test(account_number)){err.textContent='Account number must be exactly 10 digits.';return;}
  if(mismatchVisible&&!consentChecked){err.textContent='Please tick the consent box to confirm your bank details before submitting.';return;}
  btn.innerHTML='<span class="spinner"></span> Submitting…';btn.disabled=true;
  try{
    // Check email not already registered
    const existing=await sb(`users?email=eq.${encodeURIComponent(window._sEmail)}&select=id`);
    if(existing&&existing.length){err.textContent='This email is already registered. Please sign in.';btn.innerHTML='Submit application <i class="ti ti-send"></i>';btn.disabled=false;return;}
    // Check not already in signup_requests
    const existingReq=await sb(`signup_requests?email=eq.${encodeURIComponent(window._sEmail)}&select=id`);
    if(existingReq&&existingReq.length){err.textContent='An application with this email already exists.';btn.innerHTML='Submit application <i class="ti ti-send"></i>';btn.disabled=false;return;}
    await sb('signup_requests',{method:'POST',body:JSON.stringify({
      name:window._sName,email:window._sEmail,
      phone:window._sPhone||null,whatsapp:window._sWhatsapp||null,
      bank_name,account_number,account_name,
      name_mismatch:mismatchVisible,referred_by:referred_by||null,status:'pending'
    })});
    renderSignupSuccess();
  }catch(e){
    err.textContent='Error submitting application. Please try again.';
    btn.innerHTML='Submit application <i class="ti ti-send"></i>';btn.disabled=false;
  }
}

function buildContributorsTab(contributors,payments){
  if(!contributors.length)return`<div class="card"><div class="empty"><i class="ti ti-users" style="font-size:32px;display:block;margin-bottom:10px;color:#ccc"></i>No contributors yet.<br><br><button class="btn btn-primary" onclick="openAddContributor()"><i class="ti ti-plus"></i> Add first contributor</button></div></div>`;
  const rows=contributors.map(c=>{
    const pays=payments.filter(p=>p.user_id===c.id);
    const principal=pays.reduce((a,p)=>a+Number(p.amount),0);
    const interest=pays.reduce((a,p)=>a+calcAccruedInterest(p.amount,p.date),0);
    return`<tr>
      <td><div style="display:flex;align-items:center;gap:9px"><div class="avatar">${initials(c.name)}</div><div><div style="font-weight:500">${c.name}</div><div style="font-size:11px;color:#888">${c.email}</div></div></div></td>
      <td style="color:#888">${pays.length}</td>
      <td>${fmt(principal)}</td>
      <td class="green">${fmt(interest)}</td>
      <td><strong>${fmt(principal+interest)}</strong></td>
      <td><div style="display:flex;gap:5px;justify-content:flex-end">
        ${!isViewOnly()?`<button class="btn btn-sm" onclick="openAddPayment('${c.id}','${c.name.replace(/'/g,"\\'")}')"><i class="ti ti-plus"></i> Payment</button>`:''}
        <button class="btn btn-sm" onclick="openViewContributor('${c.id}','${c.name.replace(/'/g,"\\'")}')"><i class="ti ti-eye"></i></button>
        ${!isViewOnly()?`<button class="btn btn-sm btn-danger" onclick="deleteContributor('${c.id}')"><i class="ti ti-trash"></i></button>`:''}
      </div></td>
    </tr>`;
  }).join('');
  return`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h3 style="margin:0">All contributors</h3>
      ${!isViewOnly()?`<button class="btn btn-primary btn-sm" onclick="openAddContributor()"><i class="ti ti-plus"></i> Add contributor</button>`:''}
    </div>
    <div class="table-wrap"><table>
      <tr><th>Name</th><th>Payments</th><th>Principal</th><th>Interest accrued</th><th>Current total</th><th></th></tr>
      ${rows}
    </table></div>
  </div>`;
}

function buildPaymentsTab(payments,contributors){
  const sorted=[...payments].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length)return`<div class="card"><div class="empty">No payments recorded yet.</div></div>`;
  const today=new Date();today.setHours(0,0,0,0);
  const rows=sorted.map(p=>{
    const user=contributors.find(u=>u.id===p.user_id);
    const interest=calcAccruedInterest(p.amount,p.date,p.withdrawn_at);
    const endDate=p.withdrawn_at?new Date(p.withdrawn_at):today;
    const start=new Date(p.date);start.setHours(0,0,0,0);
    const weekdays=countWeekdays(start,endDate);
    const wBadge=p.withdrawn?'<span style="font-size:10px;background:#FEE2E2;color:#991B1B;padding:2px 6px;border-radius:4px;margin-left:5px">Withdrawn</span>':'';
    return`<tr style="${p.withdrawn?'opacity:.6':''}">
      <td style="font-weight:500">${user?user.name:'Unknown'}${wBadge}</td>
      <td>${fmtDate(p.date)}</td>
      <td>${fmt(p.amount)}</td>
      <td style="color:#888;font-size:11px">${weekdays} weekdays${p.withdrawn?' (to withdrawal)':''}</td>
      <td class="green">${fmt(interest)}</td>
      <td><strong>${fmt(Number(p.amount)+interest)}</strong></td>
      <td><div style="display:flex;gap:5px;justify-content:flex-end">
        ${!p.withdrawn&&!isViewOnly()?`<button class="btn btn-sm btn-edit" onclick="openEditPayment('${p.id}','${p.date}',${p.amount},'${user?user.name.replace(/'/g,"\\'"):"Unknown"}')"><i class="ti ti-pencil"></i></button>`:''}
        ${!p.withdrawn&&!isViewOnly()?`<button class="btn btn-sm btn-danger" onclick="deletePayment('${p.id}')"><i class="ti ti-trash"></i></button>`:''}
      </div></td>
    </tr>`;
  }).join('');
  return`<div class="card">
    <h3>All payments <span style="font-size:12px;color:#888;font-weight:400">&mdash; interest accrued to today</span></h3>
    <div class="table-wrap"><table>
      <tr><th>Contributor</th><th>Payment date</th><th>Amount</th><th>Weekdays elapsed</th><th>Interest accrued</th><th>Current total</th><th></th></tr>
      ${rows}
    </table></div>
  </div>`;
}

function buildRequestsTab(requests,contributors){
  if(!requests||!requests.length)return`<div class="card"><div class="empty"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:10px;color:#ccc"></i>No withdrawal requests yet.</div></div>`;
  const rows=requests.map(r=>{
    const user=contributors.find(u=>u.id===r.user_id);
    const pill=r.status==='pending'?`<span class="status-pill pill-pending">Pending</span>`:r.status==='approved'?`<span class="status-pill pill-approved">Approved</span>`:`<span class="status-pill pill-rejected">Rejected</span>`;
    const actions=!isViewOnly()&&r.status==='pending'?`
      <button class="btn btn-sm btn-primary" onclick="updateRequest('${r.id}','approved')"><i class="ti ti-check"></i> Approve</button>
      <button class="btn btn-sm btn-danger" onclick="updateRequest('${r.id}','rejected')"><i class="ti ti-x"></i> Reject</button>`:`<span style="font-size:12px;color:#aaa">&mdash;</span>`;
    return`<tr>
      <td><div style="font-weight:500">${user?user.name:'Unknown'}</div><div style="font-size:11px;color:#888">${user?user.email:''}</div></td>
      <td>${fmt(r.amount)}</td>
      <td style="font-size:12px;color:#666;max-width:180px">${r.note||'&mdash;'}</td>
      <td>${fmtDate(r.created_at)}</td>
      <td>${pill}</td>
      <td><div style="display:flex;gap:5px">${actions}</div></td>
    </tr>`;
  }).join('');
  return`<div class="card">
    <h3>Withdrawal requests</h3>
    <div class="table-wrap"><table>
      <tr><th>Contributor</th><th>Amount</th><th>Note</th><th>Date</th><th>Status</th><th>Action</th></tr>
      ${rows}
    </table></div>
  </div>`;
}

function buildSignupsTab(signups){
  if(!signups||!signups.length)return`<div class="card"><div class="empty"><i class="ti ti-user-plus" style="font-size:32px;display:block;margin-bottom:10px;color:#ccc"></i>No applications yet.</div></div>`;

async function approveSignup(id,name,email,bankName,accountName,accountNumber,phone,whatsapp){
  const pin=document.getElementById('as-pin').value.trim();
  const err=document.getElementById('as-err');
  const btn=document.getElementById('as-btn');
  if(!pin||pin.length<4){err.textContent='PIN must be at least 4 digits.';return;}
  btn.innerHTML='<span class="spinner"></span> Approving…';btn.disabled=true;
  try{
    // Create user account
    const newUsers=await sb('users',{method:'POST',body:JSON.stringify({name,email,pin,role:'contributor',phone:phone||null,whatsapp:whatsapp||null})});
    const newUser=newUsers&&newUsers[0];
    // Save bank details
    if(newUser){
      await sb('bank_details',{method:'POST',body:JSON.stringify({user_id:newUser.id,bank_name:bankName,account_name:accountName,account_number:accountNumber})});
    }
    // Mark signup request approved
    await sb(`signup_requests?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'approved'})});
    // Send email
    await sendEmail({type:'approval',to:email,name,pin});
    closeModal();
    toast('<i class="ti ti-check"></i> Approved and email sent!');
    await renderAdmin();
  }catch(e){
    err.textContent=e.message.includes('unique')||e.message.includes('duplicate')?'This email is already registered.':'Error approving. Please try again.';
    btn.innerHTML='<i class="ti ti-check"></i> Approve & send email';btn.disabled=false;
  }
}

async function rejectSignup(id){
  if(!confirm('Reject this application?'))return;
  try{
    await sb(`signup_requests?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'rejected'})});
    await renderAdmin();
  }catch(e){alert('Error rejecting application.');}
}

async function updateRequest(id,status){
  try{
    if(status==='approved'){
      const requests=await sb(`withdrawal_requests?id=eq.${id}&select=*`);
      if(!requests||!requests.length)throw new Error('Request not found');
      const req=requests[0];
      let remaining=Number(req.amount);

      // Fetch only active (non-withdrawn) payments oldest first
      const payments=await sb(`payments?user_id=eq.${req.user_id}&withdrawn=eq.false&select=*&order=date.asc`);
      if(!payments||!payments.length)throw new Error('No active payments found');

      const today=new Date().toISOString().split('T')[0];

      for(const p of payments){
        if(remaining<=0)break;
        const principal=Number(p.amount);
        const interest=calcAccruedInterest(principal,p.date,null);
        const totalValue=+(principal+interest).toFixed(2);

        if(totalValue<=remaining){
          // Mark this payment as fully withdrawn
          await sb(`payments?id=eq.${p.id}`,{method:'PATCH',body:JSON.stringify({withdrawn:true,withdrawn_at:today})});
          remaining=+(remaining-totalValue).toFixed(2);
        } else {
          // Partially consume this payment
          // Mark original as withdrawn
          await sb(`payments?id=eq.${p.id}`,{method:'PATCH',body:JSON.stringify({withdrawn:true,withdrawn_at:today})});
          // Calculate leftover and create new active payment dated today
          const leftover=+(totalValue-remaining).toFixed(2);
          remaining=0;
          if(leftover>0){
            await sb('payments',{method:'POST',body:JSON.stringify({
              user_id:req.user_id,
              amount:leftover,
              date:today,
              withdrawn:false
            })});
          }
        }
      }
    }
    await sb(`withdrawal_requests?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status})});
    await renderAdmin();
  }catch(e){alert('Error updating request: '+e.message);}
}

async function savePayment(userId){
  const date=document.getElementById('np-date').value;
  const amount=parseFloat(document.getElementById('np-amt').value);
  const err=document.getElementById('np-err');
  const btn=document.getElementById('np-btn');
  if(!date||!amount){err.textContent='All fields required.';return;}

  btn.innerHTML='<span class="spinner"></span> Saving…';btn.disabled=true;
  try{
    await sb('payments',{method:'POST',body:JSON.stringify({user_id:userId,amount,date,withdrawn:false})});
    // Send payment notification email
    try{
      const contribs=await sb('users?id=eq.'+userId+'&select=name,email');
      if(contribs&&contribs.length){
        const fmtAmt=Number(amount).toLocaleString('en-NG',{minimumFractionDigits:2});

    closeModal();await renderAdmin();

async function saveChangePin(){
  const current=document.getElementById('cp-current').value.trim();
  const newPin=document.getElementById('cp-new').value.trim();
  const confirm=document.getElementById('cp-confirm').value.trim();
  const err=document.getElementById('cp-err');
  const btn=document.getElementById('cp-btn');
  if(!current||!newPin||!confirm){err.textContent='All fields are required.';return;}
  if(current!==currentUser.pin){err.textContent='Current PIN is incorrect.';return;}
  if(newPin.length<4){err.textContent='New PIN must be at least 4 digits.';return;}
  if(newPin!==confirm){err.textContent='New PINs do not match.';return;}
  if(newPin===current){err.textContent='New PIN must be different from your current PIN.';return;}
  btn.innerHTML='<span class="spinner"></span> Updating…';btn.disabled=true;
  try{
    await sb(`users?id=eq.${currentUser.id}`,{method:'PATCH',body:JSON.stringify({pin:newPin})});
    currentUser.pin=newPin;
    closeModal();
    toast('<i class="ti ti-check"></i> PIN updated successfully');
  }catch(e){err.textContent='Error updating PIN.';btn.innerHTML='<i class="ti ti-lock-check"></i> Update PIN';btn.disabled=false;}
}

async function buildInvestmentsAdminTab(investments,contributors){
  const reservations=await sb('investment_reservations?select=*');
  if(!investments||!investments.length){
    return`<div class="card"><div class="empty"><i class="ti ti-building-store" style="font-size:32px;display:block;margin-bottom:10px;color:#ccc"></i>No investments yet.<br><br><button class="btn btn-primary" onclick="openAddInvestment()"><i class="ti ti-plus"></i> Create investment</button></div></div>`;
  }
  const cards=investments.map(inv=>{
    const invRes=reservations.filter(r=>r.investment_id===inv.id);
    const confirmedRes=invRes.filter(r=>r.status==='payment_confirmed');
    const pendingRes=invRes.filter(r=>r.status==='pending'||r.status==='approved'||r.status==='payment_made');
    const unitsSold=confirmedRes.reduce((a,r)=>a+r.units,0);
    const unitsPending=pendingRes.reduce((a,r)=>a+r.units,0);
    const pct=Math.min(100,Math.round((unitsSold/inv.total_units)*100));
    const statusColors={coming_soon:'#856404|#FFF3CD',open:'#065F46|#D1FAE5',funded:'#185FA5|#E6F1FB',closed:'#666|#f5f5f3'};
    const [sc,bg]=( statusColors[inv.status]||'#666|#f5f5f3').split('|');
    return`<div class="card" style="margin-bottom:1rem">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <h3 style="margin:0;font-size:15px">${inv.title}</h3>
            <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${bg};color:${sc}">${inv.status.replace('_',' ').toUpperCase()}</span>
          </div>
          <p style="font-size:13px;color:#888;margin-bottom:0">${inv.description||''}</p>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-sm btn-edit" onclick="openEditInvestment('${inv.id}')"><i class="ti ti-pencil"></i></button>
          <button class="btn btn-sm" onclick="openInvestmentDetail('${inv.id}')"><i class="ti ti-eye"></i> Details</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px">
        <div class="stat" style="padding:10px 12px"><div class="stat-label">Unit price</div><div style="font-size:15px;font-weight:600">${fmt(inv.unit_price)}</div></div>
        <div class="stat" style="padding:10px 12px"><div class="stat-label">Total units</div><div style="font-size:15px;font-weight:600">${inv.total_units}</div></div>
        <div class="stat" style="padding:10px 12px"><div class="stat-label">Units sold</div><div style="font-size:15px;font-weight:600;color:#0F6E56">${unitsSold}</div></div>
        <div class="stat" style="padding:10px 12px"><div class="stat-label">Pending</div><div style="font-size:15px;font-weight:600;color:#856404">${unitsPending}</div></div>
        <div class="stat" style="padding:10px 12px"><div class="stat-label">Available</div><div style="font-size:15px;font-weight:600">${inv.total_units-unitsSold-unitsPending}</div></div>
        <div class="stat" style="padding:10px 12px"><div class="stat-label">Amount raised</div><div style="font-size:15px;font-weight:600">${fmt(unitsSold*inv.unit_price)}</div></div>
      </div>
      <div style="background:#f5f5f3;border-radius:8px;height:8px;overflow:hidden;margin-bottom:6px">
        <div style="height:100%;background:#1D9E75;width:${pct}%;transition:width .3s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:12px">
        <span>${pct}% funded</span>
        <span>Target: ${fmt(inv.total_cost)}${inv.deadline?' &middot; Deadline: '+fmtDate(inv.deadline):''}</span>
      </div>
      ${pendingRes.length?`<div style="display:flex;align-items:center;justify-content:space-between;background:#FFF8E6;border:1px solid #FDEFC3;border-radius:8px;padding:10px 14px">
        <span style="font-size:13px;color:#856404"><i class="ti ti-clock"></i> ${pendingRes.length} pending reservation${pendingRes.length>1?'s':''}</span>
        <button class="btn btn-sm btn-primary" onclick="openInvestmentDetail('${inv.id}')">Review</button>
      </div>`:''}
    </div>`;
  }).join('');

  return`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h3 style="margin:0">Investment opportunities</h3>
      <button class="btn btn-primary btn-sm" onclick="openAddInvestment()"><i class="ti ti-plus"></i> Create investment</button>
    </div>
    ${cards}
  </div>`;
}

async function saveInvestment(id){
  const isEdit=!!id;
  const title=(document.getElementById(isEdit?'ei-title':'ni-title')||{}).value?.trim();
  const description=(document.getElementById(isEdit?'ei-desc':'ni-desc')||{}).value?.trim();
  const total_cost=parseFloat((document.getElementById(isEdit?'ei-cost':'ni-cost')||{}).value);
  const total_units=parseInt((document.getElementById(isEdit?'ei-units':'ni-units')||{}).value);
  const deadline=(document.getElementById(isEdit?'ei-deadline':'ni-deadline')||{}).value||null;
  const status=(document.getElementById(isEdit?'ei-status':'ni-status')||{}).value;
  const err=document.getElementById(isEdit?'ei-err':'ni-err');
  const btn=document.getElementById(isEdit?'ei-btn':'ni-btn');
  if(!title||!total_cost||!total_units){err.textContent='Title, cost and units are required.';return;}
  const unit_price=+(total_cost/total_units).toFixed(2);
  btn.innerHTML='<span class="spinner"></span> Saving…';btn.disabled=true;
  try{
    if(isEdit){
      await sb(`investments?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({title,description,total_cost,total_units,unit_price,deadline,status})});
    } else {
      await sb('investments',{method:'POST',body:JSON.stringify({title,description,total_cost,total_units,unit_price,deadline,status})});
    }
    closeModal();await renderAdmin();
  }catch(e){err.textContent='Error saving.';btn.innerHTML='<i class="ti ti-device-floppy"></i> '+( isEdit?'Save changes':'Create');btn.disabled=false;}
}

async function updateReservation(resId,status,invId){
  try{
    if(status==='payment_confirmed'){
      // Payment confirmed - now deduct from savings if payment method is savings
      const resArr=await sb(`investment_reservations?id=eq.${resId}&select=*`);
      const res=resArr[0];
      if(res.payment_method==='savings'){
        const invArr=await sb(`investments?id=eq.${res.investment_id}&select=*`);
        const inv=invArr[0];
        const totalCost=res.units*inv.unit_price;
        const pays=await sb(`payments?user_id=eq.${res.user_id}&withdrawn=eq.false&select=*&order=date.asc`);
        let remaining=totalCost;
        const today=new Date().toISOString().split('T')[0];
        for(const p of pays){
          if(remaining<=0)break;
          const principal=Number(p.amount);
          const interest=calcAccruedInterest(principal,p.date,null);
          const totalValue=+(principal+interest).toFixed(2);
          if(totalValue<=remaining){
            await sb(`payments?id=eq.${p.id}`,{method:'PATCH',body:JSON.stringify({withdrawn:true,withdrawn_at:today})});
            remaining=+(remaining-totalValue).toFixed(2);
          } else {
            await sb(`payments?id=eq.${p.id}`,{method:'PATCH',body:JSON.stringify({withdrawn:true,withdrawn_at:today})});
            const leftover=+(totalValue-remaining).toFixed(2);
            remaining=0;
            if(leftover>0){await sb('payments',{method:'POST',body:JSON.stringify({user_id:res.user_id,amount:leftover,date:today,withdrawn:false})});}
          }
        }
      }
    }
    await sb(`investment_reservations?id=eq.${resId}`,{method:'PATCH',body:JSON.stringify({status})});
    await openInvestmentDetail(invId);
  }catch(e){alert('Error updating reservation: '+e.message);}
}

  const exp=parseFloat(document.getElementById('ri-exp')?.value||0);
  const preview=document.getElementById('ri-preview');
  if(gross>0&&preview){

    document.getElementById('ri-net').textContent=fmt(net);
    document.getElementById('ri-per').textContent=fmt(net);
    preview.style.display='block';

async function saveIncome(invId,confirmedUnits){
  const month=document.getElementById('ri-month').value.trim();
  const gross_income=parseFloat(document.getElementById('ri-gross').value);
  const expenses=parseFloat(document.getElementById('ri-exp').value||0);
  const err=document.getElementById('ri-err');
  const btn=document.getElementById('ri-btn');
  if(!month||!gross_income){err.textContent='Month and gross income are required.';return;}
  const net_income=+(gross_income-expenses).toFixed(2);
  btn.innerHTML='<span class="spinner"></span> Distributing…';btn.disabled=true;
  try{
    // Save income record
    await sb('investment_income',{method:'POST',body:JSON.stringify({investment_id:invId,month,gross_income,expenses,net_income})});
    // Get confirmed reservations
    const reservations=await sb(`investment_reservations?investment_id=eq.${invId}&status=eq.payment_confirmed&select=*`);
    const totalUnits=reservations.reduce((a,r)=>a+r.units,0);
    const today=new Date().toISOString().split('T')[0];
    // Distribute to each investor by crediting savings
    for(const r of reservations){
      const share=+((r.units/totalUnits)*net_income).toFixed(2);
      if(share>0){
        await sb('payments',{method:'POST',body:JSON.stringify({
          user_id:r.user_id,
          amount:share,
          date:today,
          withdrawn:false
        })});
      }
    }
    closeModal();
    toast('<i class="ti ti-check"></i> Income recorded and distributed to '+reservations.length+' investors!');
    await renderAdmin();
  }catch(e){err.textContent='Error saving income.';btn.innerHTML='<i class="ti ti-device-floppy"></i> Record & distribute';btn.disabled=false;}
}

        const myIncome=+invIncome.reduce((a,inc)=>a+r.units/Math.max(totalConfirmedUnits,1)*inc.net_income,0).toFixed(2);

        const pct=Math.min(100,Math.round((totalConfirmedUnits/inv.total_units)*100));
        const myRefundReq=refundReqs.find(req=>req.investment_id===r.investment_id&&req.status==='pending');
        const statusColors={coming_soon:'#856404|#FFF3CD',open:'#065F46|#D1FAE5',funded:'#185FA5|#E6F1FB',closed:'#666|#f5f5f3'};

            +'<td class="green">'+fmt(inc.net_income)+'</td>'

        html+='<div class="card" style="margin-bottom:1rem">'

          +'<div><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:'+bg+';color:'+sc+';display:inline-block;margin-bottom:6px">'+inv.status.replace('_',' ').toUpperCase()+'</span>'
          +'<h3 style="font-size:15px;margin-bottom:4px">'+inv.title+'</h3>'
          +'<p style="font-size:12px;color:#888">'+(inv.description||'')+'</p></div></div>'
          +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px">'
          +'<div class="stat" style="padding:10px 12px"><div class="stat-label">Units owned</div><div style="font-size:15px;font-weight:600">'+r.units+'</div></div>'

          +'<div style="background:#f5f5f3;border-radius:8px;height:6px;overflow:hidden;margin-bottom:4px">'

          +'<div style="font-size:11px;color:#888;margin-bottom:14px">'+pct+'% of total units confirmed &middot; Target: '+fmt(inv.total_cost)+'</div>'
          +(invIncome.length?'<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Income history</div>'
          +'<div class="table-wrap"><table>'
          +'<tr><th>Month</th><th>Gross</th><th>Expenses</th><th>Net</th><th>My share</th></tr>'

          +(myRefundReq
            ?'<div style="background:#FFF8E6;border:1px solid #FDEFC3;border-radius:8px;padding:10px 14px;font-size:13px;color:#856404"><i class="ti ti-clock"></i> Refund/withdrawal request pending admin review.</div>'
            :'<div style="display:flex;gap:8px">'
            +'<button class="btn btn-sm btn-primary" '
            +'data-inv-id="'+r.investment_id+'" '
            +'data-inv-title="'+encodeURIComponent(inv.title)+'" '
            +'data-unit-price="'+inv.unit_price+'" '
            +'data-available="'+(inv.total_units-totalConfirmedUnits)+'" '

          +'<p style="color:#aaa;font-size:13px;line-height:1.6;margin-bottom:14px">'+(inv.description||'')+'</p>'
          +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
          +'<div style="background:rgba(255,255,255,.07);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:#aaa;margin-bottom:3px">Total cost</div><div style="font-weight:600;color:#C9A84C">'+fmt(inv.total_cost)+'</div></div>'
          +'<div style="background:rgba(255,255,255,.07);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:#aaa;margin-bottom:3px">Unit price</div><div style="font-weight:600;color:#C9A84C">'+fmt(inv.unit_price)+'</div></div>'

      openNotInvested.forEach(inv=>{

        const unitsSold=confirmedRes.reduce((a,r)=>a+r.units,0);
        const unitsAvailable=inv.total_units-unitsSold;
        const amountRaised=unitsSold*inv.unit_price;
        const pct=Math.min(100,Math.round((unitsSold/inv.total_units)*100));
        const deadline=inv.deadline?Math.max(0,Math.ceil((new Date(inv.deadline)-new Date())/(1000*60*60*24))):null;

        html+='<div class="card" style="margin-bottom:1rem">'
          +'<div style="display:inline-block;background:#D1FAE5;color:#065F46;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-bottom:8px">Open for investment</div>'
          +'<h3 style="font-size:15px;margin-bottom:4px">'+inv.title+'</h3>'
          +'<p style="font-size:13px;color:#888;margin-bottom:12px">'+(inv.description||'')+'</p>'
          +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:12px">'
          +'<div class="stat" style="padding:10px 12px"><div class="stat-label">Unit price</div><div style="font-size:14px;font-weight:600">'+fmt(inv.unit_price)+'</div></div>'
          +'<div class="stat" style="padding:10px 12px"><div class="stat-label">Units available</div><div style="font-size:14px;font-weight:600;color:'+(unitsAvailable<100?'#A32D2D':'#1a1a1a')+'">'+unitsAvailable+'</div></div>'
          +'<div class="stat" style="padding:10px 12px"><div class="stat-label">Units sold</div><div style="font-size:14px;font-weight:600;color:#0F6E56">'+unitsSold+'</div></div>'
          +'<div class="stat" style="padding:10px 12px"><div class="stat-label">Amount raised</div><div style="font-size:14px;font-weight:600;color:#0F6E56">'+fmt(amountRaised)+'</div></div>'
          +'<div class="stat" style="padding:10px 12px"><div class="stat-label">Target</div><div style="font-size:14px;font-weight:600">'+fmt(inv.total_cost)+'</div></div>'
          +(deadline!==null?'<div class="stat" style="padding:10px 12px"><div class="stat-label">Days left</div><div style="font-size:14px;font-weight:600;color:'+(deadline<7?'#A32D2D':'#1a1a1a')+'">'+deadline+'</div></div>':'')
          +'</div>'
          +'<div style="background:#f5f5f3;border-radius:8px;height:6px;overflow:hidden;margin-bottom:4px">'
          +'<div style="height:100%;background:#1D9E75;width:'+pct+'%"></div></div>'
          +'<div style="font-size:11px;color:#888;margin-bottom:12px">'+pct+'% funded &middot; '+confirmedRes.length+' investor'+(confirmedRes.length!==1?'s':'')+' so far</div>'
          +'<button class="btnbtn-primary" data-inv-id="'+inv.id+'" data-inv-title="'+inv.title.replace(/"/g,'&quot;')+'" data-unit-price="'+inv.unit_price+'" data-units="'+unitsAvailable+'" onclick="openReserveUnitsFromBtn(this)" style="width:100%"><i class="ti ti-shopping-cart"></i> Reserve units</button>'
          +'</div>';
      });
    }

    if(!myConfirmed.length&&!openNotInvested.length&&!comingSoon.length){

    }

    html+='</div>';
    return html;
  }catch(e){return'<div class="card"><div class="empty">Error loading investments: '+e.message+'</div></div>';}
}

function openInvestmentRefundRequestFromBtn(btn){

  const incomeReceived=parseFloat(btn.getAttribute('data-income'));
  openInvestmentRefundRequest(invId,invTitle,amountInvested,incomeReceived);
}

function openInvestmentRefundRequest(invId,invTitle,amountInvested,incomeReceived){
  openModal(`
  <h3>Request refund / withdrawal</h3>
  <p style="font-size:13px;color:#666;margin-top:-6px">${invTitle}</p>
  <div style="background:#f5f5f3;border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:4px">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:#888">Amount invested</span><strong>${fmt(amountInvested)}</strong></div>
    <div style="display:flex;justify-content:space-between"><span style="color:#888">Income received</span><strong class="green">${fmt(incomeReceived)}</strong></div>
  </div>
  <div class="warn-box"><i class="ti ti-alert-triangle" style="flex-shrink:0;margin-top:1px"></i><div>Refund requests are subject to admin approval and project liquidity. Your request will be reviewed as soon as possible.</div></div>
  <div class="field"><label>Reason for refund / withdrawal</label><textarea id="rr-note" placeholder="e.g. I need the funds urgently"></textarea></div>
  <div class="error" id="rr-err"></div>
  <div class="modal-footer">

async function saveInvestmentRefundRequest(invId){
  const note=document.getElementById('rr-note').value.trim();
  const err=document.getElementById('rr-err');
  const btn=document.getElementById('rr-btn');
  if(!note){err.textContent='Please provide a reason for your request.';return;}
  btn.innerHTML='<span class="spinner" style="border-top-color:#856404"></span> Submitting…';btn.disabled=true;
  try{
    await sb('investment_refund_requests',{method:'POST',body:JSON.stringify({
      investment_id:invId,user_id:currentUser.id,note,status:'pending'
    })});
    closeModal();
    toast('<i class="ti ti-check"></i> Refund request submitted. Admin will review shortly.');
    await renderContributor();
  }catch(e){err.textContent='Error submitting request.';btn.innerHTML='<i class="ti ti-send"></i> Submit request';btn.disabled=false;}
}

function openReserveUnitsFromBtn(btn){
  const invId=btn.getAttribute('data-inv-id');
  const invTitle=btn.getAttribute('data-inv-title');
  const unitPrice=parseFloat(btn.getAttribute('data-unit-price'));
  const units=parseInt(btn.getAttribute('data-units'));
  openReserveUnits(invId,invTitle,unitPrice,units);
}

function openReserveUnits(invId,invTitle,unitPrice,totalUnits){
  openModal(`
  <h3>Reserve units</h3>
  <p style="font-size:13px;color:#666;margin-top:-6px">${invTitle}</p>
  <div class="field"><label>Number of units</label><input id="ru-units" type="number" min="1" max="${totalUnits}" placeholder="e.g. 5" oninput="previewReservation(${unitPrice})"></div>
  <div id="ru-preview" style="background:#F0FDF8;border-radius:8px;padding:10px 14px;font-size:13px;display:none">
    Total value: <strong id="ru-total" class="green"></strong>
  </div>
  <div class="field"><label>Payment method</label>
    <select id="ru-method">
      <option value="bank_transfer">Bank transfer (within 48 hours)</option>
      <option value="savings">Deduct from my savings balance</option>
    </select>
  </div>
  <div class="info-box" style="font-size:12px"><i class="ti ti-info-circle"></i> Your reservation will be reviewed and confirmed by the admin. If paying by bank transfer, payment must be made within 48 hours or your reservation will be cancelled.</div>
  <div class="error" id="ru-err"></div>

    <button class="btn btn-primary" id="ru-btn" onclick="saveReservation('${invId}')"><i class="ti ti-send"></i> Submit reservation</button>

function previewReservation(unitPrice){
  const units=parseFloat(document.getElementById('ru-units')?.value||0);
  const preview=document.getElementById('ru-preview');
  const total=document.getElementById('ru-total');
  if(units>0&&preview&&total){
    total.textContent=fmt(units*unitPrice);
    preview.style.display='block';
  }
}

async function saveReservation(invId){
  const units=parseInt(document.getElementById('ru-units').value);
  const payment_method=document.getElementById('ru-method').value;
  const err=document.getElementById('ru-err');
  const btn=document.getElementById('ru-btn');
  if(!units||units<1){err.textContent='Please enter a valid number of units.';return;}
  btn.innerHTML='<span class="spinner"></span> Submitting…';btn.disabled=true;
  try{
    await sb('investment_reservations',{method:'POST',body:JSON.stringify({
      investment_id:invId,user_id:currentUser.id,units,payment_method,status:'pending'
    })});
    closeModal();
    toast('<i class="ti ti-check"></i> Reservation submitted! Admin will review shortly.');
    await renderContributor();
  }catch(e){err.textContent='Error submitting reservation.';btn.innerHTML='<i class="ti ti-send"></i> Submit reservation';btn.disabled=false;}
}

async function approveInvestmentRefund(refundId,invId){
  if(!confirm('Approve this refund request? The invested amount will be returned to their savings balance.'))return;
  try{
    // Get the refund request
    const reqArr=await sb(`investment_refund_requests?id=eq.${refundId}&select=*`);
    const req=reqArr[0];
    // Get the reservation
    const resArr=await sb(`investment_reservations?investment_id=eq.${invId}&user_id=eq.${req.user_id}&status=eq.payment_confirmed&select=*`);
    if(resArr&&resArr.length){
      const res=resArr[0];
      const invArr=await sb(`investments?id=eq.${invId}&select=*`);
      const inv=invArr[0];
      const refundAmount=+(res.units*inv.unit_price).toFixed(2);
      const today=new Date().toISOString().split('T')[0];
      // Credit back to savings
      await sb('payments',{method:'POST',body:JSON.stringify({user_id:req.user_id,amount:refundAmount,date:today,withdrawn:false})});
      // Cancel the reservation
      await sb(`investment_reservations?id=eq.${res.id}`,{method:'PATCH',body:JSON.stringify({status:'cancelled'})});
    }
    await sb(`investment_refund_requests?id=eq.${refundId}`,{method:'PATCH',body:JSON.stringify({status:'approved'})});
    toast('<i class="ti ti-check"></i> Refund approved and credited to savings.');
    await openInvestmentDetail(invId);
  }catch(e){alert('Error approving refund: '+e.message);}
}

async function updateInvestmentRefund(refundId,status,invId){
  try{
    await sb(`investment_refund_requests?id=eq.${refundId}`,{method:'PATCH',body:JSON.stringify({status})});
    await openInvestmentDetail(invId);
  }catch(e){alert('Error updating refund request.');}
}

async function buildDealsAdminTab(deals){
  const pending=(deals||[]).filter(d=>d.status==='pending');

  const rejected=(deals||[]).filter(d=>d.status==='rejected');

  const buildRow=(d,showActions)=>{

    const [sc,bg]=(statusColors[d.status]||'#666|#f5f5f3').split('|');

    return`<tr>
      <td><div style="font-weight:500">${d.title}</div><div style="font-size:11px;color:#888">${d.category}</div></td>
      <td>${fmt(d.price)}${d.discount?` <span style="font-size:11px;background:#D1FAE5;color:#065F46;padding:1px 6px;border-radius:4px">-${d.discount}%</span>`:''}</td>
      <td style="font-size:12px;color:#666;max-width:180px">${(d.description||'').substring(0,80)}${d.description&&d.description.length>80?'…':''}</td>
      <td><a href="https://wa.me/234${d.whatsapp.replace(/^0/,'')}" target="_blank" style="color:#065F46;font-size:12px"><i class="ti ti-brand-whatsapp"></i> ${d.whatsapp}</a></td>
      <td>${fmtDate(d.expires_at)||'&mdash;'}</td>
      <td>${pill}</td>
      <td>${actions}</td>
    </tr>`;
  };

  return`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h3 style="margin:0">Deals of the week</h3>
      <div style="font-size:12px;color:#888">${featured.length}/3 featured slots used</div>
    </div>
    ${pending.length?`<div class="card" style="margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">
        <h3 style="margin:0">Pending review</h3>
        <span class="notif-badge">${pending.length}</span>
      </div>
      <div class="table-wrap"><table>
        <tr><th>Product</th><th>Price</th><th>Description</th><th>WhatsApp</th><th>Expires</th><th>Status</th><th></th></tr>
        ${pending.map(d=>buildRow(d,true)).join('')}
      </table></div>
    </div>`:''}
    ${featured.length?`<div class="card" style="margin-bottom:1rem">
      <h3 style="margin-bottom:1rem">Featured deals <span style="font-size:12px;color:#888;font-weight:400">&mdash; visible to everyone</span></h3>
      <div class="table-wrap"><table>
        <tr><th>Product</th><th>Price</th><th>Description</th><th>WhatsApp</th><th>Expires</th><th>Status</th><th></th></tr>
        ${featured.map(d=>buildRow(d,true)).join('')}
      </table></div>
    </div>`:''}
    ${approved.length?`<div class="card" style="margin-bottom:1rem">
      <h3 style="margin-bottom:1rem">Approved deals <span style="font-size:12px;color:#888;font-weight:400">&mdash; not yet featured</span></h3>
      <div class="table-wrap"><table>
        <tr><th>Product</th><th>Price</th><th>Description</th><th>WhatsApp</th><th>Expires</th><th>Status</th><th></th></tr>
        ${approved.map(d=>buildRow(d,true)).join('')}
      </table></div>
    </div>`:''}
    ${!pending.length&&!featured.length&&!approved.length?`<div class="card"><div class="empty"><i class="ti ti-tag" style="font-size:32px;display:block;margin-bottom:10px;color:#ccc"></i>No deals submitted yet.</div></div>`:''}
  </div>`;

function buildDealsSection(deals,isHomepage){
  const featured=(deals||[]).filter(d=>d.status==='featured');
  if(!featured.length)return'';

async function saveProfileUpdateRequest(){
  const name=document.getElementById('pu-name').value.trim();
  const email=document.getElementById('pu-email').value.trim().toLowerCase();
  const phone=document.getElementById('pu-phone').value.trim()||null;
  const whatsapp=document.getElementById('pu-whatsapp').value.trim()||null;
  const bank_name=document.getElementById('pu-bank').value.trim();
  const account_number=document.getElementById('pu-anum').value.trim();
  const account_name=document.getElementById('pu-aname').value.trim();
  const reason=document.getElementById('pu-reason').value.trim();
  const err=document.getElementById('pu-err');
  const btn=document.getElementById('pu-btn');
  if(!name||!email){err.textContent='Name and email are required.';return;}
  if(account_number&&!/^\d{10}$/.test(account_number)){err.textContent='Account number must be exactly 10 digits.';return;}
  if(!reason){err.textContent='Please provide a reason for the update.';return;}
  // Check if bank details are being changed
  const bankChanging=bank_name||account_number||account_name;
  if(bankChanging&&(!bank_name||!account_number||!account_name)){
    err.textContent='If updating bank details, all three bank fields are required.';return;
  }
  btn.innerHTML='<span class="spinner"></span> Submitting…';btn.disabled=true;
  try{
    await sb('profile_update_requests',{method:'POST',body:JSON.stringify({
      user_id:currentUser.id,
      requested_name:name,
      requested_email:email,
      requested_phone:phone,
      requested_whatsapp:whatsapp,
      requested_bank_name:bank_name||null,
      requested_account_number:account_number||null,
      requested_account_name:account_name||null,
      reason,
      status:'pending'
    })});
    closeModal();
    toast('<i class="ti ti-check"></i> Profile update request submitted. Admin will review shortly.');
  }catch(e){err.textContent='Error submitting request.';btn.innerHTML='<i class="ti ti-send"></i> Submit request';btn.disabled=false;}
}

async function buildProfileRequestsAdminTab(){
  const requests=await sb('profile_update_requests?select=*&order=created_at.desc');
  const userIds=[...new Set((requests||[]).map(r=>r.user_id))];
  let usersMap={};
  if(userIds.length){
    const users=await sb(`users?id=in.(${userIds.join(',')})&select=id,name,email`);
    users.forEach(u=>{usersMap[u.id]=u;});
  }

  if(!requests||!requests.length){
    return`<div class="card"><div class="empty"><i class="ti ti-user-edit" style="font-size:32px;display:block;margin-bottom:10px;color:#ccc"></i>No profile update requests yet.</div></div>`;
  }

  const rows=requests.map(r=>{
    const u=usersMap[r.user_id]||{name:'Unknown',email:''};
    const pill=r.status==='pending'?'<span class="status-pill pill-pending">Pending</span>':
      r.status==='approved'?'<span class="status-pill pill-approved">Approved</span>':
      '<span class="status-pill pill-rejected">Rejected</span>';
    const changes=[];
    if(r.requested_name!==u.name)changes.push(`Name: <strong>${r.requested_name}</strong>`);
    if(r.requested_email!==u.email)changes.push(`Email: <strong>${r.requested_email}</strong>`);
    if(r.requested_phone)changes.push(`Phone: <strong>${r.requested_phone}</strong>`);
    if(r.requested_whatsapp)changes.push(`WhatsApp: <strong>${r.requested_whatsapp}</strong>`);
    if(r.requested_bank_name)changes.push(`Bank: <strong>${r.requested_bank_name}</strong>`);
    if(r.requested_account_number)changes.push(`Acc No: <strong style="font-family:monospace">${r.requested_account_number}</strong>`);
    if(r.requested_account_name)changes.push(`Acc Name: <strong>${r.requested_account_name}</strong>`);
    const actions=r.status==='pending'?`
      <button class="btn btn-sm btn-primary" onclick="approveProfileRequest('${r.id}','${r.user_id}')"><i class="ti ti-check"></i> Approve</button>
      <button class="btn btn-sm btn-danger" onclick="updateProfileRequest('${r.id}','rejected')"><i class="ti ti-x"></i> Reject</button>`
      :'<span style="color:#aaa;font-size:12px">&mdash;</span>';
    return`<tr>
      <td><div style="font-weight:500">${u.name}</div><div style="font-size:11px;color:#888">${u.email}</div></td>
      <td><div style="font-size:12px;line-height:1.8">${changes.join('<br>')}</div></td>
      <td style="font-size:12px;color:#666;max-width:150px">${r.reason||'&mdash;'}</td>
      <td>${fmtDate(r.created_at)}</td>
      <td>${pill}</td>
      <td><div style="display:flex;gap:5px">${actions}</div></td>
    </tr>`;
  }).join('');

  return`<div class="card">
    <h3>Profile update requests</h3>
    <div class="table-wrap"><table>
      <tr><th>Contributor</th><th>Requested changes</th><th>Reason</th><th>Date</th><th>Status</th><th></th></tr>
      ${rows}
    </table></div>
  </div>`;
}

async function approveProfileRequest(reqId,userId){
  try{
    const reqArr=await sb(`profile_update_requests?id=eq.${reqId}&select=*`);
    const req=reqArr[0];
    // Update user record
    const userUpdate={name:req.requested_name,email:req.requested_email};
    if(req.requested_phone)userUpdate.phone=req.requested_phone;
    if(req.requested_whatsapp)userUpdate.whatsapp=req.requested_whatsapp;
    await sb(`users?id=eq.${userId}`,{method:'PATCH',body:JSON.stringify(userUpdate)});
    // Update bank details if provided
    if(req.requested_bank_name){
      const existing=await sb(`bank_details?user_id=eq.${userId}&select=id`);
      const bankData={bank_name:req.requested_bank_name,account_number:req.requested_account_number,account_name:req.requested_account_name};
      if(existing&&existing.length){
        await sb(`bank_details?id=eq.${existing[0].id}`,{method:'PATCH',body:JSON.stringify(bankData)});
      } else {
        await sb('bank_details',{method:'POST',body:JSON.stringify({user_id:userId,...bankData})});
      }
    }
    await updateProfileRequest(reqId,'approved');
    toast('<i class="ti ti-check"></i> Profile updated successfully.');
  }catch(e){alert('Error approving request: '+e.message);}
}

async function updateProfileRequest(reqId,status){
  try{
    await sb(`profile_update_requests?id=eq.${reqId}`,{method:'PATCH',body:JSON.stringify({status})});
    await renderAdmin();
  }catch(e){alert('Error updating request.');}
}

async function registerWebinar(webinarId){
  const name=document.getElementById('wr-name').value.trim();
  const email=document.getElementById('wr-email').value.trim().toLowerCase();
  const phone=document.getElementById('wr-phone').value.trim();
  const err=document.getElementById('wr-err');
  const btn=document.getElementById('wr-btn');
  if(!name||!email){err.textContent='Please enter your name and email.';return;}
  if(!email.includes('@')||!email.includes('.')){err.textContent='Please enter a valid email address.';return;}
  btn.innerHTML='<span class="spinner"></span> Registering…';btn.disabled=true;
  try{
    await sb('webinar_registrations',{method:'POST',body:JSON.stringify({name,email,phone:phone||null,webinar_id:webinarId})});
    setHTML(`
    <div style="min-height:100vh;background:#f5f5f3;display:flex;align-items:center;justify-content:center;padding:2rem">
      <div style="text-align:center;max-width:420px">
        <div style="width:72px;height:72px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:32px;color:#0F6E56"><i class="ti ti-check"></i></div>
        <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">You are registered!</h2>
        <p style="color:#666;line-height:1.7;margin-bottom:20px">Thank you <strong>${name}</strong>! The Zoom link will be sent to <strong>${email}</strong> before the event.</p>
        <p style="font-size:13px;color:#888;margin-bottom:20px">While you are here &mdash; join Fundova and start your savings journey today.</p>
        <a href="/" class="btn btn-primary" style="display:inline-flex;padding:12px 24px;text-decoration:none"><i class="ti ti-currency-naira"></i> Learn about Fundova savings</a>
      </div>
    </div>`);
  }catch(e){
    err.textContent='Error registering. Please try again.';
    btn.innerHTML='<i class="ti ti-send"></i> Register &mdash; it is free';
    btn.disabled=false;
  }
}

async function buildWebinarsAdminTab(){

  const rows=(webinars||[]).map(w=>{

    const statusColors={active:'#065F46|#D1FAE5',draft:'#856404|#FFF3CD',past:'#666|#f5f5f3'};
    const [sc,bg]=(statusColors[w.status]||'#666|#f5f5f3').split('|');
    return`<tr>

      <td><div style="display:flex;gap:5px">
        <button class="btn btn-sm btn-edit" onclick="openEditWebinar('${w.id}')"><i class="ti ti-pencil"></i></button>

async function uploadSpeakerPhoto(input,speakerNum){
  const file=input.files[0];
  if(!file)return;
  const urlEl=document.getElementById('wn-sp'+speakerNum+'-url');
  urlEl.textContent='Uploading…';
  try{
    const ext=file.name.split('.').pop();
    const path='speakers/'+Date.now()+'-'+speakerNum+'.'+ext;
    const res=await fetch(`${SB_URL}/storage/v1/object/fundova-media/${path}`,{
      method:'POST',headers:{'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type,'x-upsert':'true'},body:file
    });
    if(!res.ok)throw new Error('Upload failed');
    const url=`${SB_URL}/storage/v1/object/public/fundova-media/${path}`;
    input.dataset.url=url;
    urlEl.textContent='Uploaded!';
    urlEl.style.color='#0F6E56';
  }catch(e){urlEl.textContent='Upload failed: '+e.message;urlEl.style.color='#A32D2D';}
}

async function uploadWebinarFlyer(input){
  const file=input.files[0];
  if(!file)return;
  const urlEl=document.getElementById('wn-flyer-url');
  urlEl.textContent='Uploading…';
  try{
    const ext=file.name.split('.').pop();
    const path='flyers/'+Date.now()+'.'+ext;
    const res=await fetch(`${SB_URL}/storage/v1/object/fundova-media/${path}`,{
      method:'POST',headers:{'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type,'x-upsert':'true'},body:file
    });
    if(!res.ok)throw new Error('Upload failed');
    const url=`${SB_URL}/storage/v1/object/public/fundova-media/${path}`;
    input.dataset.url=url;
    urlEl.textContent='Uploaded!';
    urlEl.style.color='#0F6E56';
  }catch(e){urlEl.textContent='Upload failed: '+e.message;urlEl.style.color='#A32D2D';}
}

async function saveWebinar(id){
  const isEdit=!!id;
  const title=document.getElementById('wn-title').value.trim();
  const subtitle=document.getElementById('wn-subtitle').value.trim();
  const description=document.getElementById('wn-desc').value.trim();
  const event_date=document.getElementById('wn-date').value||null;
  const event_time=document.getElementById('wn-time').value.trim()||null;
  const zoom_link=document.getElementById('wn-zoom').value.trim()||null;
  const topicsRaw=document.getElementById('wn-topics').value.trim();
  const topics=topicsRaw?JSON.stringify(topicsRaw.split('\n').filter(t=>t.trim())):null;
  const status=document.getElementById('wn-status').value;
  const flyer_url=document.getElementById('wn-flyer')?.dataset?.url||null;
  const err=document.getElementById('wn-err');
  const btn=document.getElementById('wn-btn');

  if(!title){err.textContent='Title is required.';return;}

  // Build speakers array
  const speakers=[];
  for(let i=1;i<=3;i++){
    const name=document.getElementById('wn-sp'+i+'-name')?.value?.trim();
    const spTitle=document.getElementById('wn-sp'+i+'-title')?.value?.trim();
    const photo_url=document.getElementById('wn-sp'+i+'-photo')?.dataset?.url||null;
    if(name)speakers.push({name,title:spTitle||'',photo_url});
  }

  btn.innerHTML='<span class="spinner"></span> Saving…';btn.disabled=true;

  // If setting to active, deactivate all others first
  if(status==='active'){
    await sb('webinars?status=eq.active',{method:'PATCH',body:JSON.stringify({status:'past'})});
  }

  try{
    const payload={title,subtitle,description,event_date,event_time,zoom_link,topics,speakers:JSON.stringify(speakers),flyer_url,status};
    if(isEdit){
      await sb(`webinars?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(payload)});
    } else {
      await sb('webinars',{method:'POST',body:JSON.stringify(payload)});
    }
    closeModal();
    toast('<i class="ti ti-check"></i> Webinar '+(isEdit?'updated':'created')+'!');
    await renderAdmin();
  }catch(e){err.textContent='Error saving.';btn.innerHTML='<i class="ti ti-device-floppy"></i> '+(isEdit?'Save changes':'Create webinar');btn.disabled=false;}
}

    return`<div style="background:#f5f5f3;border-radius:10px;padding:12px;margin-bottom:10px">
      <div style="font-size:12px;font-weight:600;margin-bottom:8px">Speaker ${i+1}</div>

      <div class="field" style="margin-bottom:8px"><input id="wn-sp${i+1}-title" placeholder="Title / role" value="${sp.title||''}"></div>
      <div class="field" style="margin-bottom:0">
        ${sp.photo_url?`<img src="${sp.photo_url}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;margin-bottom:8px"><br>`:''}
        <label style="font-size:12px">Update photo</label>

    </div>`;
  }).join('')}

  <div class="field"><label>Update flyer</label>
    ${w.flyer_url?`<img src="${w.flyer_url}" style="width:100%;border-radius:8px;margin-bottom:8px">`:''}

      <option value="draft" ${w.status==='draft'?'selected':''}>Draft</option>
      <option value="active" ${w.status==='active'?'selected':''}>Active</option>
      <option value="past" ${w.status==='past'?'selected':''}>Past</option>
    </select>
  </div>
  <div class="error" id="wn-err"></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="wn-btn" onclick="saveWebinar('${id}')"><i class="ti ti-device-floppy"></i> Save changes</button>

async function setWebinarStatus(id,status){
  try{
    if(status==='active'){
      await sb('webinars?status=eq.active',{method:'PATCH',body:JSON.stringify({status:'past'})});
    }
    await sb(`webinars?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status})});
    await renderAdmin();
  }catch(e){alert('Error updating webinar.');}
}

function openSetSavingsGoal(){
  openModal(`

    <button class="btn btn-primary" id="sg-btn" onclick="saveSavingsGoal()"><i class="ti ti-target"></i> Save goal</button>
  </div>`);
}

async function saveSavingsGoal(){
  const amount=parseFloat(document.getElementById('sg-amount').value);
  const err=document.getElementById('sg-err');
  const btn=document.getElementById('sg-btn');
  if(!amount||amount<=0){err.textContent='Please enter a valid target amount.';return;}
  btn.innerHTML='<span class="spinner"></span> Saving…';btn.disabled=true;
  try{
    await sb(`users?id=eq.${currentUser.id}`,{method:'PATCH',body:JSON.stringify({savings_goal:amount})});
    currentUser.savings_goal=amount;
    saveSession(currentUser);
    closeModal();
    await renderContributor();
  }catch(e){err.textContent='Error saving goal.';btn.innerHTML='<i class="ti ti-target"></i> Save goal';btn.disabled=false;}
}

async function clearSavingsGoal(){
  try{
    await sb(`users?id=eq.${currentUser.id}`,{method:'PATCH',body:JSON.stringify({savings_goal:null})});
    currentUser.savings_goal=null;
    saveSession(currentUser);
    closeModal();
    await renderContributor();
  }catch(e){alert('Error removing goal.');}
}
