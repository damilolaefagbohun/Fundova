async function sb(path,opts={}){
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),10000);
  try{
    const res=await fetch(SB_URL+'/rest/v1/'+path,{
      signal:controller.signal,
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
      ...opts
    });
    clearTimeout(timeout);
    if(!res.ok){const e=await res.text();throw new Error(e);}
    const text=await res.text();
    return text?JSON.parse(text):null;
  }catch(e){
    clearTimeout(timeout);
    if(e.name==='AbortError')throw new Error('Request timed out. Check your internet connection.');
    throw e;
  }
}

function countWeekdays(startDate,endDate){
  let count=0;const d=new Date(startDate);const end=new Date(endDate);
  d.setHours(0,0,0,0);end.setHours(0,0,0,0);
  while(d<end){const day=d.getDay();if(day!==0&&day!==6)count++;d.setDate(d.getDate()+1);}
  return count;
}
function calcAccruedInterest(amount,payDate){
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(payDate);start.setHours(0,0,0,0);
  if(start>=today)return 0;
  return+(Number(amount)*RATE*(countWeekdays(start,today)/WEEKDAYS_PER_YEAR)).toFixed(2);
}
function fmt(n){return'₦'+Number(n).toLocaleString('en-NG',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function initials(name){return(name||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}

function toast(msg,color='#1D9E75'){
  const b=document.createElement('div');
  b.style.cssText=`position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${color};color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.15)`;
  b.innerHTML=msg;document.body.appendChild(b);setTimeout(()=>b.remove(),3500);
}

    const users=await sb(`users?email=eq.${encodeURIComponent(email)}&pin=eq.${encodeURIComponent(pin)}&select=*`);
    if(!users||!users.length){err.textContent='Invalid email or PIN.';btn.innerHTML='<i class="ti ti-login"></i> Sign in';btn.disabled=false;return;}
    currentUser=users[0];await render();
  }catch(e){err.textContent='Connection error. Please try again.';btn.innerHTML='<i class="ti ti-login"></i> Sign in';btn.disabled=false;}
}

function goSignupStep2(){

  document.getElementById('sd2').classList.add('active');
  document.getElementById('signup-body').innerHTML=`
    <p style="font-size:13px;color:#666;margin-top:-6px">Step 2 of 2 — Bank details for payout</p>
    <div class="field"><label>Bank name</label><input id="s-bank" placeholder="e.g. First Bank, GTBank, Zenith"></div>
    <div class="field"><label>Account number</label><input id="s-anum" type="text" maxlength="10" placeholder="10-digit account number" oninput="checkNameMatch()"></div>
    <div class="field"><label>Account name <span style="color:#888;font-weight:400">(as shown on your bank account)</span></label><input id="s-aname" placeholder="e.g. Adaeze Okonkwo" oninput="checkNameMatch()"></div>
    <div id="s-mismatch" style="display:none" class="warn-box"><i class="ti ti-alert-triangle" style="margin-top:1px;flex-shrink:0"></i><div>Your account name <strong id="s-aname-val"></strong> doesn't seem to match your registered name <strong>${window._sName}</strong>. Please confirm this is correct before proceeding.</div></div>
    <label class="checkbox-row" id="s-consent-row" style="display:none"><input type="checkbox" id="s-consent"> I confirm that the bank account details above are correct and belong to me.</label>
    <hr style="border:none;border-top:1px solid #e5e5e2">

    <div class="error" id="s-err2"></div>

      <button class="btn" onclick="renderSignupStep1()"><i class="ti ti-arrow-left"></i> Back</button>
      <button class="btn btn-primary" id="s-btn2" onclick="submitSignup()" style="flex:1">Submit application <i class="ti ti-send"></i></button>
    </div>`;
}

function checkNameMatch(){
  const accountName=(document.getElementById('s-aname').value||'').trim().toLowerCase();
  const registeredName=(window._sName||'').trim().toLowerCase();
  const mismatch=document.getElementById('s-mismatch');
  const consentRow=document.getElementById('s-consent-row');
  const anameVal=document.getElementById('s-aname-val');
  if(accountName.length>2&&registeredName.length>2){
    const aParts=accountName.split(' ');
    const rParts=registeredName.split(' ');
    const overlap=aParts.filter(p=>p.length>1&&rParts.some(r=>r.includes(p)||p.includes(r)));
    if(overlap.length===0){
      anameVal.textContent=document.getElementById('s-aname').value.trim();
      mismatch.style.display='flex';
      consentRow.style.display='flex';
      document.getElementById('s-aname').classList.add('warn');
    } else {
      mismatch.style.display='none';
      consentRow.style.display='none';
      document.getElementById('s-aname').classList.remove('warn');
    }
  }
}

async function submitSignup(){
  const bank_name=document.getElementById('s-bank').value.trim();
  const referred_by=(document.getElementById('s-referral')?.value||'').trim();
  const account_number=document.getElementById('s-anum').value.trim();
  const account_name=document.getElementById('s-aname').value.trim();
  const err=document.getElementById('s-err2');
  const btn=document.getElementById('s-btn2');
  const mismatchVisible=document.getElementById('s-mismatch').style.display!=='none';
  const consentChecked=mismatchVisible?document.getElementById('s-consent').checked:true;
  if(!bank_name||!account_number||!account_name){err.textContent='All fields are required.';return;}
  if(!/^\d{10}$/.test(account_number)){err.textContent='Account number must be exactly 10 digits.';return;}
  if(mismatchVisible&&!consentChecked){err.textContent='Please tick the consent box to confirm your bank details before submitting.';return;}
  btn.innerHTML='<span class="spinner"></span> Submitting…';btn.disabled=true;
  try{
    // Check email not already registered
    const existing=await sb(`users?email=eq.${encodeURIComponent(window._sEmail)}&select=id`);
    if(existing&&existing.length){err.textContent='This email is already registered. Please sign in.';btn.innerHTML='Submit application <i class="ti ti-send"></i>';btn.disabled=false;return;}
    // Check not already in signup_requests
    const existingReq=await sb(`signup_requests?email=eq.${encodeURIComponent(window._sEmail)}&select=id`);
    if(existingReq&&existingReq.length){err.textContent='An application with this email already exists.';btn.innerHTML='Submit application <i class="ti ti-send"></i>';btn.disabled=false;return;}
    await sb('signup_requests',{method:'POST',body:JSON.stringify({
      name:window._sName,email:window._sEmail,
      bank_name,account_number,account_name,
      name_mismatch:mismatchVisible,referred_by:referred_by||null,status:'pending'
    })});
    renderSignupSuccess();
  }catch(e){
    err.textContent='Error submitting application. Please try again.';
    btn.innerHTML='Submit application <i class="ti ti-send"></i>';btn.disabled=false;
  }
}

function buildPaymentsTab(payments,contributors){
  const sorted=[...payments].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length)return`<div class="card"><div class="empty">No payments recorded yet.</div></div>`;
  const today=new Date();today.setHours(0,0,0,0);
  const rows=sorted.map(p=>{
    const user=contributors.find(u=>u.id===p.user_id);
    const interest=calcAccruedInterest(p.amount,p.date);
    const start=new Date(p.date);start.setHours(0,0,0,0);
    const weekdays=countWeekdays(start,today);
    return`<tr>
      <td style="font-weight:500">${user?user.name:'Unknown'}</td>
      <td>${fmtDate(p.date)}</td>
      <td>${fmt(p.amount)}</td>
      <td style="color:#888;font-size:11px">${weekdays} weekdays</td>
      <td class="green">${fmt(interest)}</td>
      <td><strong>${fmt(Number(p.amount)+interest)}</strong></td>
      <td><div style="display:flex;gap:5px;justify-content:flex-end">
        <button class="btn btn-sm btn-edit" onclick="openEditPayment('${p.id}','${p.date}',${p.amount},'${user?user.name.replace(/'/g,"\\'"):"Unknown"}')"><i class="ti ti-pencil"></i></button>
        <button class="btn btn-sm btn-danger" onclick="deletePayment('${p.id}')"><i class="ti ti-trash"></i></button>

  return`<div class="card">

    <div class="table-wrap"><table>
      <tr><th>Contributor</th><th>Payment date</th><th>Amount</th><th>Weekdays elapsed</th><th>Interest accrued</th><th>Current total</th><th></th></tr>

}

    <div style="margin-bottom:4px"><span style="color:#888">Account name:</span> ${accountName}</div>
    <div><span style="color:#888">Account number:</span> <span style="font-family:monospace">${accountNumber}</span></div>
  </div>
  <div class="field"><label>Set PIN for contributor</label><input id="as-pin" type="text" maxlength="6" placeholder="e.g. 4521" autocomplete="off"></div>
  <div class="error" id="as-err"></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="as-btn" onclick="approveSignup('${id}','${name.replace(/'/g,"\\'")}','${email}','${bankName.replace(/'/g,"\\'")}','${accountName.replace(/'/g,"\\'")}','${accountNumber}')"><i class="ti ti-check"></i> Approve & send email</button>
  </div>`);

async function approveSignup(id,name,email,bankName,accountName,accountNumber){
  const pin=document.getElementById('as-pin').value.trim();
  const err=document.getElementById('as-err');
  const btn=document.getElementById('as-btn');
  if(!pin||pin.length<4){err.textContent='PIN must be at least 4 digits.';return;}
  btn.innerHTML='<span class="spinner"></span> Approving…';btn.disabled=true;
  try{
    // Create user account
    const newUsers=await sb('users',{method:'POST',body:JSON.stringify({name,email,pin,role:'contributor'})});
    const newUser=newUsers&&newUsers[0];
    // Save bank details
    if(newUser){
      await sb('bank_details',{method:'POST',body:JSON.stringify({user_id:newUser.id,bank_name:bankName,account_name:accountName,account_number:accountNumber})});
    }
    // Mark signup request approved
    await sb(`signup_requests?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'approved'})});
    // Send email
    await sendEmail(email,name,pin);
    closeModal();
    toast('<i class="ti ti-check"></i> Approved and email sent!');
    await renderAdmin();
  }catch(e){
    err.textContent=e.message.includes('unique')||e.message.includes('duplicate')?'This email is already registered.':'Error approving. Please try again.';
    btn.innerHTML='<i class="ti ti-check"></i> Approve & send email';btn.disabled=false;
  }
}

async function rejectSignup(id){
  if(!confirm('Reject this application?'))return;
  try{
    await sb(`signup_requests?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'rejected'})});
    await renderAdmin();
  }catch(e){alert('Error rejecting application.');}
}

function openWithdrawRequest(currentTotal){
  openModal(`
  <h3>Request withdrawal</h3>
  <p style="font-size:13px;color:#666">Your current total is <strong>${fmt(currentTotal)}</strong>. You cannot request more than this amount.</p>
  <div class="field"><label>Amount to withdraw (₦)</label><input id="wr-amt" type="number" min="1" step="0.01" placeholder="e.g. 50000"></div>
  <div style="font-size:12px;color:#888;margin-top:-6px">Maximum: ${fmt(currentTotal)}</div>
  <div class="field"><label>Note <span style="color:#aaa;font-weight:400">(optional)</span></label><textarea id="wr-note" placeholder="e.g. I need funds for school fees"></textarea></div>
  <div class="error" id="wr-err"></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-warn" id="wr-btn" onclick="saveWithdrawRequest(${currentTotal})"><i class="ti ti-cash"></i> Submit request</button>
  </div>`);
  document.getElementById('wr-amt').addEventListener('input',function(){
    const val=parseFloat(this.value);
    const err=document.getElementById('wr-err');
    if(val>currentTotal)err.textContent=`Amount cannot exceed your total of ${fmt(currentTotal)}.`;
    else err.textContent='';
  });
}

async function saveWithdrawRequest(currentTotal){
  const amount=parseFloat(document.getElementById('wr-amt').value);
  const note=document.getElementById('wr-note').value.trim();
  const err=document.getElementById('wr-err');
  const btn=document.getElementById('wr-btn');
  if(!amount||amount<=0){err.textContent='Please enter a valid amount.';return;}
  if(amount>currentTotal){err.textContent=`Amount cannot exceed your current total of ${fmt(currentTotal)}.`;return;}
  btn.innerHTML='<span class="spinner" style="border-top-color:#856404"></span> Submitting…';btn.disabled=true;
  try{
    await sb('withdrawal_requests',{method:'POST',body:JSON.stringify({user_id:currentUser.id,amount,note,status:'pending'})});
    closeModal();await renderContributor();
  }catch(e){err.textContent='Error submitting. Please try again.';btn.innerHTML='<i class="ti ti-cash"></i> Submit request';btn.disabled=false;}
}

    ${bankSection}
    <hr class="divider">
    <div style="font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Payment history</div>
    <div class="table-wrap"><table>
      <tr><th>Date</th><th>Amount</th><th>Weekdays</th><th>Interest</th><th></th></tr>
      ${rows}
    </table></div>
    <div class="modal-footer">
      <button class="btn" onclick="openAddPayment('${userId}','${userName.replace(/'/g,"\\'")}')"><i class="ti ti-plus"></i> Add payment</button>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>`);
  }catch(e){openModal(`<div style="color:#A32D2D;padding:1rem">Error loading data: ${e.message}</div>`);}
}

function openEditBankDetails(userId,userName,bankId,bankName,accountName,accountNumber){
  openModal(`
  <h3>${bankId&&bankId!=='null'?'Edit':'Add'} bank details</h3>
  <p style="font-size:13px;color:#666;margin-top:-6px">${userName}</p>
  <div class="field"><label>Bank name</label><input id="bd-bank" placeholder="e.g. First Bank" value="${bankName}"></div>
  <div class="field"><label>Account name</label><input id="bd-aname" placeholder="e.g. Adaeze Okonkwo" value="${accountName}"></div>
  <div class="field"><label>Account number</label><input id="bd-anum" type="text" maxlength="10" placeholder="e.g. 0123456789" value="${accountNumber}"></div>
  <div class="error" id="bd-err"></div>
  <div class="modal-footer">
    <button class="btn" onclick="openViewContributor('${userId}','${userName.replace(/'/g,"\\'")}')">Cancel</button>
    <button class="btn btn-primary" id="bd-btn" onclick="saveBankDetails('${userId}','${userName.replace(/'/g,"\\'")}','${bankId}')"><i class="ti ti-device-floppy"></i> Save details</button>
  </div>`);
}

async function saveBankDetails(userId,userName,bankId){
  const bank_name=document.getElementById('bd-bank').value.trim();
  const account_name=document.getElementById('bd-aname').value.trim();
  const account_number=document.getElementById('bd-anum').value.trim();
  const err=document.getElementById('bd-err');
  const btn=document.getElementById('bd-btn');
  if(!bank_name||!account_name||!account_number){err.textContent='All fields are required.';return;}
  if(!/^\d{10}$/.test(account_number)){err.textContent='Account number must be exactly 10 digits.';return;}
  btn.innerHTML='<span class="spinner"></span> Saving…';btn.disabled=true;
  try{
    if(bankId&&bankId!=='null'){
      await sb(`bank_details?id=eq.${bankId}`,{method:'PATCH',body:JSON.stringify({bank_name,account_name,account_number})});
    } else {
      await sb('bank_details',{method:'POST',body:JSON.stringify({user_id:userId,bank_name,account_name,account_number})});
    }
    await openViewContributor(userId,userName);
  }catch(e){err.textContent='Error saving.';btn.innerHTML='<i class="ti ti-device-floppy"></i> Save details';btn.disabled=false;}
}

async function deletePaymentFromView(payId,userId,userName){
  if(!confirm('Delete this payment?'))return;
  try{await sb(`payments?id=eq.${payId}`,{method:'DELETE'});await openViewContributor(userId,userName);}
  catch(e){alert('Error deleting payment.');}
}

function openChangePin(){
  openModal(`
  <h3>Change PIN</h3>
  <p style="font-size:13px;color:#666;margin-top:-6px">Choose a new PIN you'll use to sign in.</p>
  <div class="field"><label>Current PIN</label><input id="cp-current" type="password" maxlength="6" placeholder="Enter your current PIN"></div>
  <div class="field"><label>New PIN</label><input id="cp-new" type="password" maxlength="6" placeholder="Choose a new PIN"></div>
  <div class="field"><label>Confirm new PIN</label><input id="cp-confirm" type="password" maxlength="6" placeholder="Repeat new PIN"></div>
  <div class="error" id="cp-err"></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="cp-btn" onclick="saveChangePin()"><i class="ti ti-lock-check"></i> Update PIN</button>
  </div>`);
}

async function saveChangePin(){
  const current=document.getElementById('cp-current').value.trim();
  const newPin=document.getElementById('cp-new').value.trim();
  const confirm=document.getElementById('cp-confirm').value.trim();
  const err=document.getElementById('cp-err');
  const btn=document.getElementById('cp-btn');
  if(!current||!newPin||!confirm){err.textContent='All fields are required.';return;}
  if(current!==currentUser.pin){err.textContent='Current PIN is incorrect.';return;}
  if(newPin.length<4){err.textContent='New PIN must be at least 4 digits.';return;}
  if(newPin!==confirm){err.textContent='New PINs do not match.';return;}
  if(newPin===current){err.textContent='New PIN must be different from your current PIN.';return;}
  btn.innerHTML='<span class="spinner"></span> Updating…';btn.disabled=true;
  try{
    await sb(`users?id=eq.${currentUser.id}`,{method:'PATCH',body:JSON.stringify({pin:newPin})});
    currentUser.pin=newPin;
    closeModal();
    toast('<i class="ti ti-check"></i> PIN updated successfully');
  }catch(e){err.textContent='Error updating PIN.';btn.innerHTML='<i class="ti ti-lock-check"></i> Update PIN';btn.disabled=false;}
}

render();
